[pytest]
# pytest configuration for pr-summary-handoff skill

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (involve external tools like git/gh)
    slow: Slow tests (network calls, Telegram notifications)
